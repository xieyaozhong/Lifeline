name: Deploy Lifeline to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: lifeline-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Validate JavaScript and local links
        shell: bash
        run: |
          set -euo pipefail
          cat app-v2.*.part > /tmp/lifeline-v2.js
          node --check /tmp/lifeline-v2.js
          cat self-training-checklist/question-bank.*.part > /tmp/junior-math-bank.js
          node --check /tmp/junior-math-bank.js
          find . -type f -name '*.js' -not -path './.git/*' -print0 | xargs -0 -n1 node --check
          python scripts/validate_site.py

      - name: Build static site
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build_site.py
          test -f _site/index.html
          test -f _site/portal/index.html
          test -f _site/schedule-studio/index.html
          test -f _site/self-training-checklist/index.html
          test -f _site/self-training-checklist/question-bank.css
          test -f _site/self-training-checklist/question-bank-loader.js
          test -f _site/self-training-checklist/question-bank.04.part
          test -f _site/appointment-generator/index.html
          test -f _site/build-info.json

      - name: Write deployment summary
        shell: bash
        run: |
          {
            echo '## Lifeline Pages build'
            echo ''
            echo '- Main app: `/Lifeline/`'
            echo '- Project portal: `/Lifeline/portal/`'
            echo '- Schedule Studio: `/Lifeline/schedule-studio/`'
            echo '- Self-training checklist + math bank: `/Lifeline/self-training-checklist/`'
            echo '- Appointment Generator: `/Lifeline/appointment-generator/`'
            echo '- Commit: `${{ github.sha }}`'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Validate Lifeline web applications

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate source and build output
        shell: bash
        run: |
          set -euo pipefail
          cat app-v2.*.part > /tmp/lifeline-v2.js
          node --check /tmp/lifeline-v2.js
          cat self-training-checklist/question-bank.*.part > /tmp/junior-math-bank.js
          node --check /tmp/junior-math-bank.js
          cat schedule-studio/date-export.*.part > /tmp/schedule-date-export.js
          node --check /tmp/schedule-date-export.js
          find . -type f -name '*.js' -not -path './.git/*' -print0 | xargs -0 -n1 node --check
          python scripts/validate_site.py
          python scripts/build_site.py
          test -s _site/build-info.json
          test -f _site/404.html
          test -f _site/schedule-studio/index.html
          test -f _site/schedule-studio/date-export-loader.js
          test -f _site/schedule-studio/date-export.04.part
          grep -q 'date-export-loader.js' _site/schedule-studio/index.html
          test -f _site/self-training-checklist/index.html
          test -f _site/self-training-checklist/question-bank-loader.js
          test -f _site/self-training-checklist/question-bank.04.part
